apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-service
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  # ingressClassName is set per overlay (nginx on minikube, traefik on k3s).
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ahc-app-backend-service
                port:
                  number: 8000
