apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: couchdb
  labels:
    app: couchdb
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  serviceName: appendixes-db
  replicas: 1
  selector:
    matchLabels:
      app: couchdb
  template:
    metadata:
      labels:
        app: couchdb
    spec:
      containers:
        - name: couchdb
          image: couchdb:3.5.2
          ports:
            - containerPort: 5984
              protocol: TCP
          envFrom:
            - secretRef:
                name: couchdb-credentials
          volumeMounts:
            - name: couchdb-data
              mountPath: /opt/couchdb/data
          readinessProbe:
            httpGet:
              path: /_up
              port: 5984
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_up
              port: 5984
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
  volumeClaimTemplates:
    - metadata:
        name: couchdb-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
