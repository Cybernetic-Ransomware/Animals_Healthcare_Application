apiVersion: apps/v1
kind: Deployment
metadata:
  name: ahc-app-backend
  labels:
    app: ahc-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ahc-web
  template:
    metadata:
      labels:
        app: ahc-web
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        # The app image runs as appuser (uid/gid 1000). hostPath-backed
        # provisioners (minikube standard, k3s local-path) do not honor
        # fsGroup, and kubelet creates subPath directories as root, so the
        # volumes must be prepared explicitly before the app writes to them.
        - name: prepare-storage
          image: busybox:1.37
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /mnt/media/animal_pic /mnt/media/attachments /mnt/media/profile_pics
              [ "$(stat -c %u /mnt/media)" = "1000" ] || chown -R 1000:1000 /mnt/media
              [ "$(stat -c %u /mnt/private)" = "1000" ] || chown -R 1000:1000 /mnt/private
          volumeMounts:
            - name: app-media
              mountPath: /mnt/media
            - name: app-private
              mountPath: /mnt/private
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
        - name: collectstatic
          image: ghcr.io/cybernetic-ransomware/ahc-app:prod
          command: ["python", "manage.py", "collectstatic", "--noinput"]
          envFrom:
            - configMapRef:
                name: ahc-app-config
            - secretRef:
                name: ahc-app-secrets
            - secretRef:
                name: couchdb-credentials
          env:
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: static-collected
              mountPath: /app/static_collected
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      containers:
        - name: ahc-app-backend
          image: ghcr.io/cybernetic-ransomware/ahc-app:prod
          envFrom:
            - configMapRef:
                name: ahc-app-config
            - secretRef:
                name: ahc-app-secrets
            - secretRef:
                name: couchdb-credentials
          env:
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 8000
              protocol: TCP
          volumeMounts:
            - name: static-collected
              mountPath: /app/static_collected
            - name: app-media
              mountPath: /app/static/media/animal_pic
              subPath: animal_pic
            - name: app-media
              mountPath: /app/static/media/attachments
              subPath: attachments
            - name: app-media
              mountPath: /app/static/media/profile_pics
              subPath: profile_pics
            - name: app-private
              mountPath: /app/private
          startupProbe:
            httpGet:
              path: /livez
              port: 8000
              httpHeaders:
                - name: Host
                  value: localhost
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /livez
              port: 8000
              httpHeaders:
                - name: Host
                  value: localhost
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
              httpHeaders:
                - name: Host
                  value: localhost
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: static-collected
          emptyDir: {}
        - name: app-media
          persistentVolumeClaim:
            claimName: app-media-pvc
        - name: app-private
          persistentVolumeClaim:
            claimName: app-private-pvc
