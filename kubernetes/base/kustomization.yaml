apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ahc

resources:
  - namespace.yaml
  - config/app-configmap.yaml
  - storage/app-media-pvc.yaml
  - storage/app-private-pvc.yaml
  - web/deployment.yaml
  - web/service.yaml
  - celery/deployment.yaml
  - celery-beat/deployment.yaml
  - flower/deployment.yaml
  - flower/service.yaml
  - redis/deployment.yaml
  - redis/service.yaml
  - postgres/statefulset.yaml
  - postgres/service.yaml
  - couchdb/statefulset.yaml
  - couchdb/service.yaml
  - couchdb/init-job.yaml
  - jobs/migrate-job.yaml
  - ingress.yaml

images:
  - name: ghcr.io/cybernetic-ransomware/ahc-app
    newTag: prod
