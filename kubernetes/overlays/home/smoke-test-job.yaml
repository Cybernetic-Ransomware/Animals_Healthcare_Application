apiVersion: batch/v1
kind: Job
metadata:
  name: ahc-smoke-test
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 180
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: smoke
          image: curlimages/curl:8.10.1
          command:
            - sh
            - -c
            - |
              set -eu
              curl -fsS -H "Host: localhost" http://ahc-app-backend-service:8000/livez
              curl -fsS -H "Host: localhost" http://ahc-app-backend-service:8000/readyz
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
