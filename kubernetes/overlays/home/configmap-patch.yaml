apiVersion: v1
kind: ConfigMap
metadata:
  name: ahc-app-config
data:
  # TODO: replace ahc.example.home with the real AHC_DOMAIN before the
  # first home sync. localhost must stay in ALLOWED_HOSTS for kubelet probes.
