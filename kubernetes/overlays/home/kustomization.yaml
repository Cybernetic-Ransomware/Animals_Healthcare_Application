apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Production overlay for the home k3s cluster, synced by the ahc-home
# ArgoCD Application. Secrets are SealedSecrets encrypted with the home
# cluster controller key. The image tag below is managed by CI
# (kustomize edit set image after each image publish).
#
# The files under sealed/ must be generated with kubeseal against the
# home cluster before the first sync — see kubernetes/README.md.

resources:
  - ../../base
  - sealed/app-sealedsecret.yaml
  - sealed/postgres-sealedsecret.yaml
  - sealed/couchdb-sealedsecret.yaml
  - sealed/flower-sealedsecret.yaml
  - backup/backup-pvc.yaml
  - backup/pg-backup-cronjob.yaml
  - backup/couchdb-export-cronjob.yaml
  - backup/files-backup-cronjob.yaml
  - smoke-test-job.yaml

patches:
  - path: ingress-patch.yaml
  - path: configmap-patch.yaml
  - path: celery-beat-patch.yaml
  # kubeseal copies input Secret annotations into spec.template.metadata
  # (the unsealed Secret), not onto the SealedSecret itself — without this
  # patch SealedSecrets land in wave 0, after the databases that need them.
  - target:
      kind: SealedSecret
    patch: |-
      apiVersion: bitnami.com/v1alpha1
      kind: SealedSecret
      metadata:
        name: placeholder-overridden-by-target
        annotations:
          argocd.argoproj.io/sync-wave: "-3"

images:
  - name: ghcr.io/cybernetic-ransomware/ahc-app
    newTag: prod
