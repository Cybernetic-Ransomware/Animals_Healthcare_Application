apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Local development overlay: plain Secrets filled from the committed
# templates and applied with `kubectl apply -k`. The filled secret files are
# git-ignored, so this overlay MUST NOT be used as an ArgoCD Application
# source (ArgoCD checks out the repo and would not find them).

resources:
  - ../../base
  - secrets/app-secret.yaml
  - secrets/postgres-secret.yaml
  - secrets/couchdb-secret.yaml
  - secrets/flower-secret.yaml

patches:
  - path: ingress-patch.yaml

images:
  - name: ghcr.io/cybernetic-ransomware/ahc-app
    newTag: prod
