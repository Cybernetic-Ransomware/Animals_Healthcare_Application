apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# GitOps test overlay: SealedSecrets encrypted with the sealed-secrets
# controller key of the local minikube cluster. Used by the
# ahc-minikube-test ArgoCD Application to rehearse the full sync flow
# (waves, hooks, sealed secrets) before touching the home cluster.
#
# The files under sealed/ must be generated with kubeseal against the
# minikube cluster before this overlay can build — see kubernetes/README.md.

resources:
  - ../../base
  - sealed/app-sealedsecret.yaml
  - sealed/postgres-sealedsecret.yaml
  - sealed/couchdb-sealedsecret.yaml
  - sealed/flower-sealedsecret.yaml

patches:
  - path: ingress-patch.yaml
  # kubeseal copies input Secret annotations into spec.template.metadata
  # (the unsealed Secret), not onto the SealedSecret itself — without this
  # patch SealedSecrets land in wave 0, after the databases that need them.
  - target:
      kind: SealedSecret
    patch: |-
      apiVersion: bitnami.com/v1alpha1
      kind: SealedSecret
      metadata:
        name: placeholder-overridden-by-target
        annotations:
          argocd.argoproj.io/sync-wave: "-3"

images:
  - name: ghcr.io/cybernetic-ransomware/ahc-app
    # Pinned to the branch image for the ArgoCD rehearsal (see README,
    # "Testing branch code through ArgoCD"). Revert to prod before merging.
    newTag: sha-d515554252e936a41ee9a6d559732a284d788686
