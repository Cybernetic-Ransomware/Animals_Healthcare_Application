apiVersion: v1
kind: ServiceAccount
metadata:
  name: ahc-deployer
  namespace: argo
---
# Minimum executor permissions required by Argo Workflows >= 3.4: every
# workflow pod reports step results as workflowtaskresults in the workflow
# namespace, regardless of what the steps themselves do.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ahc-workflow-executor
  namespace: argo
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ahc-workflow-executor
  namespace: argo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ahc-workflow-executor
subjects:
  - kind: ServiceAccount
    name: ahc-deployer
    namespace: argo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ahc-deployer
  namespace: ahc
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ahc-deployer
  namespace: ahc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ahc-deployer
subjects:
  - kind: ServiceAccount
    name: ahc-deployer
    namespace: argo
