apiVersion: v1
kind: ServiceAccount
metadata:
  name: ahc-deployer
  namespace: argo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ahc-deployer
  namespace: ahc
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ahc-deployer
  namespace: ahc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ahc-deployer
subjects:
  - kind: ServiceAccount
    name: ahc-deployer
    namespace: argo
