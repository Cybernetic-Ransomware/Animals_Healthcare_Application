{% if animal.profile_image %}
<a role="button"
   class="contrast btn-with-bg"
   style="background-image: url('{{ animal.profile_image.url }}');"
   href="{% url 'animal_profile' pk=animal.id %}"
   aria-label="Go to profile of {{ animal.full_name }}"
>{{ animal.full_name }}</a>
{% else %}
<a role="button"
   class="secondary outline"
   href="{% url 'animal_profile' pk=animal.id %}"
   aria-label="Go to profile of {{ animal.full_name }}"
>{{ animal.full_name }}</a>
{% endif %}
