<a class="animal-card"
   href="{% url 'animal_profile' pk=animal.id %}"
   aria-label="Go to profile of {{ animal.full_name }}"
>
    <div class="animal-card__thumb">
        {% if animal.profile_image %}
        <img src="{{ animal.profile_image.url }}" alt="">
        {% endif %}
    </div>
    <span class="animal-card__name">{{ animal.full_name }}</span>
</a>
