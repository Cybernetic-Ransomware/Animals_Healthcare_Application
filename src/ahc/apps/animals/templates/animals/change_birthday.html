{% extends "homepage/base.html" %}
{% block content %}
    <form method="post">
        {% csrf_token %}
        <div>
            {{ form.birthdate.label_tag }}
            {{ form.birthdate }}
            {% for error in form.birthdate.errors %}
                <small class="form-error">{{ error }}</small>
            {% endfor %}
        </div>
        <button type="submit">Change</button>
    </form>
    <p><a href="{% url 'animal_profile' pk=animal_id %}">Return to profile</a></p>
{% endblock %}
