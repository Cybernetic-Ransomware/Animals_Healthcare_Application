{% extends "homepage/base.html" %}
{% block content %}
    <div class="content-section">
        <form method="POST">
            {% csrf_token %}
            <fieldset>
                <legend>Set a new owner for {{ full_name }}:</legend>
                <div>
                    {{ form.new_owner.label_tag }}
                    {{ form.new_owner }}
                    {% for error in form.new_owner.errors %}
                        <small class="form-error">{{ error }}</small>
                    {% endfor %}
                </div>
                <div class="grid">
                    <button type="submit" name="set_keeper" value="False">Change the owner</button>
                    <button class="secondary outline" type="submit" name="set_keeper" value="True">Change owner and set yourself as a keeper</button>
                </div>
            </fieldset>
        </form>
    </div>
    <br>
    <small>
        Return to <a href="{{ animal_url }}">Pet profile</a> or <a href="{% url 'animals_stable' %}">Stable</a>
    </small>
{% endblock %}
