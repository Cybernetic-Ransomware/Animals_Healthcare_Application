{% extends "homepage/base.html" %}
{% load static %}
{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/hide_large_description.css' %}">
{% endblock %}
{% block content %}

{% if available_months %}
<div class="timeline-controls">
    <select
        hx-get="{% url 'full_timeline_of_notes' pk=request.resolver_match.kwargs.pk %}"
        hx-target="#timeline-results"
        hx-swap="innerHTML"
        hx-push-url="true"
        hx-include="[name='type_of_event'],[name='tag_name']"
        name="month"
        aria-label="Jump to month">
        <option value="">— Jump to month —</option>
        {% for month in available_months %}
        <option value="{{ month|date:'Y-m' }}" {% if scroll_to_month == month|date:"Y-m" %}selected{% endif %}>
            {{ month|date:"F Y" }}
        </option>
        {% endfor %}
    </select>
    {% if type_of_event %}<input type="hidden" name="type_of_event" value="{{ type_of_event }}">{% endif %}
    {% if tag_name %}<input type="hidden" name="tag_name" value="{{ tag_name }}">{% endif %}
</div>
{% endif %}

<div id="timeline-results">
    {% include "medical_notes/partials/_timeline_page.html" %}
</div>

{% endblock %}
