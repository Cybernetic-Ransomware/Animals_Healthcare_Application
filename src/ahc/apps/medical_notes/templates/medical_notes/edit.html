{% extends "homepage/base.html" %}
{% load static %}
{% block extra_js %}{% endblock %}
{% block content %}
<div class="content-section">
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <fieldset>
            <legend>Edit a note related with {{ note.animal.full_name }}:</legend>
            {% include "partials/form_fields.html" %}
        </fieldset>
        <button type="submit">Submit!</button>
    </form>
    <br>
    <small>
        <a href="{% url 'animals_stable' %}">Return to the stable</a>
    </small>
</div>
{% endblock %}
