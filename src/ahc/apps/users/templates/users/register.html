{% extends "homepage/base.html" %}
{% block content %}
    <div class="content-section">
        <form method="POST">
            {% csrf_token %}
            <fieldset>
                <legend>Join!</legend>
                {% include "partials/form_fields.html" %}
            </fieldset>
            <button type="submit">Sign Up</button>
        </form>
        <br>
        <small>
            Have an account? <a href="{% url 'login' %}">Sign In</a>
        </small>
    </div>
{% endblock %}
