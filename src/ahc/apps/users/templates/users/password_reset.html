{% extends "homepage/base.html" %}
{% block content %}
<div>
    <form method="post">
        {% csrf_token %}
        <fieldset>
            <legend>Reset Password</legend>
            {% include "partials/form_fields.html" %}
        </fieldset>
        <div>
            <button type="submit">Send</button>
            <a role="button" class="secondary outline" href="{% url 'login' %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
